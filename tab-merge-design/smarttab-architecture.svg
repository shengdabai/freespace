  <text x="332" y="638" fill="#6a6a6a" font-size="10">• feat: add auth module</text>
  <text x="332" y="652" fill="#6a6a6a" font-size="10">• fix: memory leak in parser</text>
  <rect x="322" y="672" width="236" height="60" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
