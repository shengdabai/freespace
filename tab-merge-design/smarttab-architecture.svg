  <text x="730" y="340" text-anchor="middle" fill="#6a6a6a" font-size="11">JSON backup</text>
  <rect x="50" y="415" width="860" height="80" rx="10" fill="none" stroke="#e8e6e3" stroke-width="1.5" stroke-dasharray="6,3"/>
