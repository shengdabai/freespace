<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 800" width="960" height="800">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, 'PingFang SC', sans-serif; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#5a5a5a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#2563eb"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000010"/>
    </filter>
  </defs>
  <rect width="960" height="800" fill="#f8f6f3"/>
  <text x="480" y="36" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="700">SmartTab — Product Architecture</text>
  <text x="480" y="56" text-anchor="middle" fill="#6a6a6a" font-size="13">OneTab + Tab Out 融合架构</text>
  <rect x="50" y="75" width="860" height="70" rx="10" fill="none" stroke="#a8c5e6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="68" y="97" fill="#6a6a6a" font-size="12" font-weight="600">BROWSER LAYER</text>
  <rect x="120" y="90" width="200" height="44" rx="10" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow)"/>
  <text x="220" y="117" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">Extension Icon Click</text>
  <rect x="380" y="90" width="200" height="44" rx="10" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow)"/>
