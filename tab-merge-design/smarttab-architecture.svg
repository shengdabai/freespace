    <text x="258" y="11" fill="#6a6a6a" font-size="11">New Feature</text>
    <rect x="370" width="12" height="12" rx="3" fill="#e8e6e3"/>
    <text x="388" y="11" fill="#6a6a6a" font-size="11">Infrastructure</text>
