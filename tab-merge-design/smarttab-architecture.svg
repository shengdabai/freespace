  <rect x="95" y="632" width="170" height="22" rx="4" fill="#eff6ff"/>
  <text x="103" y="647" fill="#2563eb" font-size="10">  feat: add auth module</text>
  <rect x="95" y="659" width="170" height="22" rx="4" fill="#f0fdf4"/>
  <text x="103" y="674" fill="#16a34a" font-size="10">● Stack Overflow</text>
  <rect x="95" y="686" width="170" height="22" rx="4" fill="#f0fdf4"/>
  <text x="103" y="701" fill="#16a34a" font-size="10">  fix CORS error</text>
  <rect x="95" y="713" width="170" height="22" rx="4" fill="#fef3c7"/>
  <text x="103" y="728" fill="#ca8a04" font-size="10">● Gmail (3 unread)</text>
