  <rect x="180" y="430" width="240" height="50" rx="10" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="452" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">chrome.storage.local</text>
