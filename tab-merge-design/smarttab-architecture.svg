  <text x="440" y="578" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">Auto-Grouped View</text>
  <text x="440" y="594" text-anchor="middle" fill="#6a6a6a" font-size="11">按域名分类 + 关键词摘要</text>
  <rect x="322" y="605" width="236" height="60" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
