  <text x="740" y="117" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">New Tab Override</text>
  <rect x="50" y="170" width="860" height="220" rx="10" fill="none" stroke="#9dd4c7" stroke-width="1.5" stroke-dasharray="6,3"/>
