  <text x="332" y="705" fill="#6a6a6a" font-size="10">• React hooks guide</text>
  <text x="332" y="719" fill="#6a6a6a" font-size="10">• Tailwind config ref</text>
  <rect x="610" y="555" width="260" height="195" rx="12" fill="#ffffff" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow)"/>
