  <rect x="80" y="205" width="160" height="65" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="160" y="232" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">Tab Collector</text>
  <text x="160" y="252" text-anchor="middle" fill="#6a6a6a" font-size="11">chrome.tabs.query()</text>
  <rect x="280" y="205" width="160" height="65" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="360" y="232" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">Smart Classifier</text>
  <text x="360" y="252" text-anchor="middle" fill="#6a6a6a" font-size="11">domain + path rules</text>
