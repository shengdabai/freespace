  <text x="490" y="340" text-anchor="middle" fill="#6a6a6a" font-size="11">vertical / horizontal toggle</text>
  <rect x="650" y="300" width="160" height="55" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow)"/>
