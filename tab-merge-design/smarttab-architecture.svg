  <text x="740" y="614" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="500">🔄 Restore All Tabs</text>
  <rect x="625" y="631" width="230" height="28" rx="6" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="740" y="650" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="500">📑 Save Session</text>
  <rect x="625" y="667" width="230" height="28" rx="6" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="740" y="686" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="500">📐 Toggle V/H Layout</text>
  <rect x="625" y="703" width="230" height="28" rx="6" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="740" y="722" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="500">🗑 Close Duplicates</text>
  <line x1="220" y1="134" x2="160" y2="203" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="134" x2="360" y2="203" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="740" y1="134" x2="760" y2="203" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 160 270 L 160 490 L 180 490 L 180 553" stroke="#5a5a5a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 490 355 L 490 490 L 440 490 L 440 553" stroke="#5a5a5a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="100" y="487" width="80" height="16" rx="3" fill="#f8f6f3"/>
  <text x="140" y="499" text-anchor="middle" fill="#5a5a5a" font-size="11">tab data</text>
  <rect x="435" y="487" width="80" height="16" rx="3" fill="#f8f6f3"/>
  <text x="475" y="499" text-anchor="middle" fill="#5a5a5a" font-size="11">groups</text>
  <g transform="translate(80, 785)">
    <rect width="12" height="12" rx="3" fill="#9dd4c7"/>
    <text x="18" y="11" fill="#6a6a6a" font-size="11">From Tab Out</text>
    <rect x="120" width="12" height="12" rx="3" fill="#a8c5e6"/>
